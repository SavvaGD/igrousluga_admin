<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказы — Админка</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background: #0d1117; color: #e6edf3; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #58a6ff; }
        .order-card { background: #161b22; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #238636; }
        .order-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .order-name { font-size: 20px; font-weight: bold; }
        .order-status { padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; background: #1f2937; color: #60a5fa; }
        .order-status.done { background: #0d2818; color: #3fb950; border: 1px solid #238636; }
        .order-date { color: #8b949e; font-size: 14px; margin: 5px 0; }
        .order-details { margin-top: 10px; color: #c9d1d9; }
        .order-details strong { color: #8b949e; }
        .order-actions { margin-top: 15px; }
        .btn-done { background: #238636; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-done:hover { background: #2ea043; }
        .btn-done:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        .no-orders { text-align: center; color: #8b949e; font-size: 18px; padding: 40px 0; }
        .back-link { display: inline-block; margin-top: 20px; color: #58a6ff; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .order-id { color: #8b949e; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Заказы</h1>
    <div id="ordersContainer">
        <div class="no-orders">⏳ Загрузка...</div>
    </div>
    <a href="index.html" class="back-link">← На главную</a>
</div>

<script>
// ССЫЛКА НА СКРИПТ ЗАКАЗОВ
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzRsPEz4deERyab1cx0a7fp9oPEYGMby3Pqm93MYJbewgMJtZ3MbhfKd1PcRZmUZCT5/exec';

async function loadOrders() {
    const container = document.getElementById('ordersContainer');
    try {
        const response = await fetch(SCRIPT_URL);
        if (!response.ok) throw new Error('Ошибка загрузки');
        const orders = await response.json();

        if (!orders || orders.length === 0) {
            container.innerHTML = '<div class="no-orders">📭 Пока нет заказов</div>';
            return;
        }

        let html = '';
        orders.forEach(order => {
            // Показываем только "Новые" или "Выполненные"
            const isDone = order.status === 'Выполнен';
            const statusText = isDone ? '✅ Выполнен' : '🆕 Новый';
            const statusClass = isDone ? 'done' : '';
            
            html += `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-name">${order.name}</span>
                        <span class="order-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="order-date">📅 ${order.date} | 📱 ${order.phone} | <span class="order-id">#${order.id}</span></div>
                    <div class="order-details">
                        <strong>Услуга:</strong> ${order.service}<br>
                        <strong>Описание:</strong> ${order.description || '—'}
                    </div>
                    <div class="order-actions">
                        ${!isDone ? `<button class="btn-done" onclick="markDone('${order.id}')">✅ Отметить выполненным</button>` : ''}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    } catch (error) {
        container.innerHTML = '<div class="no-orders">❌ Ошибка загрузки заказов</div>';
        console.error(error);
    }
}

window.markDone = async function(id) {
    if (!confirm(`Отметить заказ как выполненный?`)) return;
    try {
        const url = SCRIPT_URL + '?action=update&id=' + encodeURIComponent(id) + '&status=Выполнен';
        await fetch(url, { mode: 'no-cors' });
        alert('✅ Заказ отмечен как выполненный');
        loadOrders(); // Обновляем список
    } catch (error) {
        alert('❌ Ошибка');
    }
};

loadOrders();
</script>

</body>
</html>
