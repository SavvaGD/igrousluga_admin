<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказы</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background: #0d1117; color: #e6edf3; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #58a6ff; }
        .order-card { background: #161b22; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #238636; }
        .order-name { font-size: 20px; font-weight: bold; }
        .order-date { color: #8b949e; font-size: 14px; margin: 5px 0; }
        .order-details { margin-top: 10px; color: #c9d1d9; }
        .order-details strong { color: #8b949e; }
        .order-actions { margin-top: 15px; }
        .btn-delete { background: #da3633; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-delete:hover { background: #f85149; }
        .no-orders { text-align: center; color: #8b949e; font-size: 18px; padding: 40px 0; }
        .back-link { display: inline-block; margin-top: 20px; color: #58a6ff; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Заказы</h1>
    <div id="ordersContainer">
        <div class="no-orders">⏳ Загрузка...</div>
    </div>
    <a href="index.html" class="back-link">← На главную</a>
</div>

<script>
// ТВОЯ НОВАЯ ССЫЛКА
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNkXnUslHGuOl4pwvU2wdX7LX85EtiDZydEKvjyiw0JRfW0Dyw9-U_Ly7jvgkLb66c/exec';

async function loadOrders() {
    const container = document.getElementById('ordersContainer');
    try {
        const response = await fetch(SCRIPT_URL);
        if (!response.ok) throw new Error('Ошибка загрузки');
        const orders = await response.json();

        if (!orders || orders.length === 0) {
            container.innerHTML = '<div class="no-orders">📭 Пока нет заказов</div>';
            return;
        }

        let html = '';
        orders.forEach(order => {
            html += `
                <div class="order-card">
                    <div class="order-name">${order.name}</div>
                    <div class="order-date">📅 ${order.date} | 📱 ${order.phone}</div>
                    <div class="order-details">
                        <strong>Услуга:</strong> ${order.service}<br>
                        <strong>Описание:</strong> ${order.description || '—'}
                    </div>
                    <div class="order-actions">
                        <button class="btn-delete" onclick="deleteOrder(${order.row})">🗑️ Удалить</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    } catch (error) {
        container.innerHTML = '<div class="no-orders">❌ Ошибка загрузки заказов</div>';
        console.error(error);
    }
}

window.deleteOrder = async function(row) {
    if (!confirm(`Удалить заказ?`)) return;
    try {
        const url = SCRIPT_URL + '?action=delete&row=' + row;
        await fetch(url, { mode: 'no-cors' });
        alert('🗑️ Заказ удалён');
        loadOrders();
    } catch (error) {
        alert('❌ Ошибка удаления');
    }
};

loadOrders();
</script>

</body>
</html>
